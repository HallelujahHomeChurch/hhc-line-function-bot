name: Production Release

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release.yml
      - scripts/deploy-aca.sh
      - Dockerfile
      - .dockerignore
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.json
      - eslint.config.js
      - vitest.config.ts
      - src/**
      - config/**
      - aca.containerapp.yaml
      - aca.catalog-sync-job.yaml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: hhc-line-function-bot-production
  cancel-in-progress: false

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    env:
      ACR_NAME: alive
      ACR_LOGIN_SERVER: alive.azurecr.io
      IMAGE_REPOSITORY: alive/hhc-line-function-bot
      IMAGE_TAG: main-${{ github.run_id }}
      RESOURCE_GROUP: alive
      CONTAINER_APP_NAME: hhc-line-function-bot
      CATALOG_SYNC_JOB_NAME: hhc-line-bot-catalog-sync
    steps:
      - uses: actions/checkout@v4
      - name: Sign in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Install Container Apps extension
        run: az extension add --name containerapp --upgrade --yes
      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry "${ACR_NAME}" \
            --image "${IMAGE_REPOSITORY}:${IMAGE_TAG}" \
            --image "${IMAGE_REPOSITORY}:latest" \
            --file Dockerfile \
            .
      - name: Deploy image and wait for healthy revision
        run: bash scripts/deploy-aca.sh
