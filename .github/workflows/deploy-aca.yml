name: Deploy Azure Container App

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy. Defaults to the selected commit SHA."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  GHCR_IMAGE: ghcr.io/hallelujahhomechurch/hhc-line-function-bot

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Resolve image
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          IMAGE="$GHCR_IMAGE:$TAG"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Update Container App
        shell: bash
        run: |
          set -euo pipefail
          az containerapp update \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.CONTAINER_APP_NAME }}" \
            --image "$IMAGE"
